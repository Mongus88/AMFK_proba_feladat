name: Playwright Tests (with uv)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Melyik tesztet futtassuk? (hagyja üresen az összeshez)'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Set Playwright Custom Path
        run: echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/ms-playwright" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('uv.lock') }}

      - name: Install Playwright Browsers & Deps
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            uv run playwright install --with-deps chromium
          else
            uv run playwright install-deps chromium
          fi

      - name: Run tests
        env:
          X_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          uv run pytest api/tests/ ui/tests/${{ github.event.inputs.test_file }} --html=report.html --self-contained-html

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html

      - name: Upload Trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/